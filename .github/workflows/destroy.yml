name: Destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/aws-llm-platform-dev-github-oidc-role
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.13.3"
          terraform_wrapper: false

      - uses: jdx/mise-action@v4
        with:
          tool_versions: |
            terragrunt 0.72.6
          github_token: ${{ github.token }}

      - name: Destroy dev infra
        shell: bash
        working-directory: infra/live/dev/aws
        run: |
          set -euo pipefail
          terragrunt run-all --terragrunt-non-interactive --terragrunt-exclude-dir ./oidc destroy -auto-approve
